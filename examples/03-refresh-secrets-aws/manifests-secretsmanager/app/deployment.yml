---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-secrets-deploy-secretsmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitops-secrets-app-secretsmanager
  template:
    metadata:
      labels:
        app: gitops-secrets-app-secretsmanager
    spec:
      containers:
      - name: gitops-secrets-app-secretsmanager
        image: docker.io/kostiscodefresh/simple-secret-app:latest 
        imagePullPolicy: Always   
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: mysql
          mountPath: "/secrets"
          readOnly: true      
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
      volumes:
      - name: mysql
        secret:
          secretName: mysql-credentials
