apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: ssm-parameterstore
spec:
  provider:
    aws:
      service: ParameterStore
      region: ##AWS-Region##
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: secretsmanager
            key: access_key
          secretAccessKeySecretRef:
            name: secretsmanager
            key: secret_access_key
            