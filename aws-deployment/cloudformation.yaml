AWSTemplateFormatVersion: "2010-09-09"
Description: Create virtual machines for Docker and Kubernetes workshop

Parameters:

  Ubuntu2404AMI: 
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/canonical/ubuntu/server/noble/stable/current/amd64/hvm/ebs-gp3/ami-id
  EC2InstanceType:
    Type: String
    Default: t2.large  # t2.large is 8 GiB ram, 2 vCPUs - this should be enough for a test environment

  PrivateIpControl:
    Type: String
    Default: 172.31.0.10
  PrivateIpWorker:
    Type: String
    Default: 172.31.0.11
  PrivateIpWorker2:
    Type: String
    Default: 172.31.0.12

  Usernames:
    Type: String
    Default: "User1,User2"
  DefaultPassword:
    Type: String
    Default: SesamOpenU2026#
  ConsultantName:
    Type: String
    Default: Frederique

Mappings:
  AWSManagedRoles:
    SSM:
      AmazonSSMManagedInstanceCore: "arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore"
    ECR:
      EC2InstanceProfileForImageBuilderECRContainerBuilds: "arn:aws:iam::aws:policy/EC2InstanceProfileForImageBuilderECRContainerBuilds"

Resources:

  KubernetesVPC:
    Type: AWS::EC2::VPC
    Properties: 
      CidrBlock: 172.31.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      InstanceTenancy: default
      Tags:
        - Key: Name
          Value: !Sub "Kubernetes-workshop-${ConsultantName}"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref KubernetesVPC

  ExecuteDeleteVpcFunction:
    Type: Custom::ExecuteDeleteVpcFunction
    Properties:
      Vpc           : !Ref KubernetesVPC
      ServiceToken  : !GetAtt DeleteVpcFunction.Arn

  PublicSubnetAZa:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Join ["", [!Ref "AWS::Region", "a"]]
      CidrBlock: 172.31.0.0/16
      MapPublicIpOnLaunch: true
      VpcId: !Ref KubernetesVPC
      Tags:
        - Key: Name
          Value: PublicSubnetAZa
  PublicSubnetAZaRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetAZa

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      Tags:
        - Key: Name
          Value: PublicRouteTable
      VpcId: !Ref KubernetesVPC
  PublicRoutePublicInternet:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  KubernetesIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
              - ec2.amazonaws.com
            Action:
              - 'sts:AssumeRole'
      Path: /
      ManagedPolicyArns:
        - !FindInMap [ "AWSManagedRoles", "SSM", "AmazonSSMManagedInstanceCore"]
        - !FindInMap [ "AWSManagedRoles", "ECR", "EC2InstanceProfileForImageBuilderECRContainerBuilds"]

  KubernetesIAMInstanceProfile:
    Type: "AWS::IAM::InstanceProfile"
    Properties:
      Path: "/"
      Roles:
        - !Ref KubernetesIAMRole

  KubernetesSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Securitygroup for K8S
      VpcId: !Ref KubernetesVPC
      SecurityGroupIngress:
        - CidrIp: 0.0.0.0/0
          FromPort: 30001
          ToPort: 30030
          IpProtocol: TCP
        - CidrIp: 172.31.0.0/16
          FromPort: 0
          ToPort: 65535
          IpProtocol: TCP
        - CidrIp: 172.31.0.0/16
          FromPort: 0
          ToPort: 65535
          IpProtocol: UDP

  KubernetesControlNode:
    Type: AWS::EC2::Instance
    Metadata:
      'AWS::CloudFormation::Init':
        config:
          packages:
            apt:
              git: []
              net-tools: []
          files:
