AWSTemplateFormatVersion: "2010-09-09"
Description: Create virtual machines for Docker and Kubernetes workshop

Parameters:

  Ubuntu2404AMI: 
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/canonical/ubuntu/server/noble/stable/current/amd64/hvm/ebs-gp3/ami-id
  EC2InstanceType:
    Type: String
    Default: t2.large  # t2.large is 8 GiB ram, 2 vCPUs - this should be enough for a test environment

  PrivateIpControl:
    Type: String
    Default: 172.31.0.10
  PrivateIpWorker:
    Type: String
    Default: 172.31.0.11
  PrivateIpWorker2:
    Type: String
    Default: 172.31.0.12

  Usernames:
    Type: String
    Default: "User1,User2"
  DefaultPassword:
    Type: String
    Default: SesamOpenU2026#
  ConsultantName:
    Type: String
    Default: Frederique

Mappings:
  AWSManagedRoles:
    SSM:
      AmazonSSMManagedInstanceCore: "arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore"
    ECR:
      EC2InstanceProfileForImageBuilderECRContainerBuilds: "arn:aws:iam::aws:policy/EC2InstanceProfileForImageBuilderECRContainerBuilds"

Resources:

  KubernetesVPC:
    Type: AWS::EC2::VPC
    Properties: 
      CidrBlock: 172.31.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      InstanceTenancy: default
      Tags:
        - Key: Name
          Value: !Sub "Kubernetes-workshop-${ConsultantName}"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref KubernetesVPC

  ExecuteDeleteVpcFunction:
    Type: Custom::ExecuteDeleteVpcFunction
    Properties:
      Vpc           : !Ref KubernetesVPC
      ServiceToken  : !GetAtt DeleteVpcFunction.Arn

  PublicSubnetAZa:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Join ["", [!Ref "AWS::Region", "a"]]
      CidrBlock: 172.31.0.0/16
      MapPublicIpOnLaunch: true
      VpcId: !Ref KubernetesVPC
      Tags:
        - Key: Name
          Value: PublicSubnetAZa
  PublicSubnetAZaRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetAZa

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      Tags:
        - Key: Name
          Value: PublicRouteTable
      VpcId: !Ref KubernetesVPC
  PublicRoutePublicInternet:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  KubernetesIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
              - ec2.amazonaws.com
            Action:
              - 'sts:AssumeRole'
      Path: /
      ManagedPolicyArns:
        - !FindInMap [ "AWSManagedRoles", "SSM", "AmazonSSMManagedInstanceCore"]
        - !FindInMap [ "AWSManagedRoles", "ECR", "EC2InstanceProfileForImageBuilderECRContainerBuilds"]

  KubernetesIAMInstanceProfile:
    Type: "AWS::IAM::InstanceProfile"
    Properties:
      Path: "/"
      Roles:
        - !Ref KubernetesIAMRole

  KubernetesSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Securitygroup for K8S
      VpcId: !Ref KubernetesVPC
      SecurityGroupIngress:
        - CidrIp: 0.0.0.0/0
          FromPort: 30001
          ToPort: 30030
          IpProtocol: TCP
        - CidrIp: 172.31.0.0/16
          FromPort: 0
          ToPort: 65535
          IpProtocol: TCP
        - CidrIp: 172.31.0.0/16
          FromPort: 0
          ToPort: 65535
          IpProtocol: UDP

  KubernetesControlNode:
    Type: AWS::EC2::Instance
    Metadata:
      'AWS::CloudFormation::Init':
        config:
          packages:
            apt:
              git: []
              net-tools: []
          files:
            '/opt/xforce/01-initialize-files.sh':
              content: !Sub |
                #!/bin/bash
                mkdir -p /clone
                cd /clone

                git clone https://github.com/FrederiqueRetsema/Kubecon26-example-repo.git

                # Change variables in the scripts by values in the CloudFormation template
                find . -type f -exec sed -i 's/${DefaultPassword}/'${DefaultPassword}'/g' {} \;

          commands:
            01-initialize-files:
              command: /opt/xforce/01-initialize-files.sh 2>&1 | tee /var/log/01-initialize-files.out
              ignoreErrors: false
            02-install-kubernetes-controlnode:
              command: /clone/Kubecon26-example-repo/aws-deployment/install/02-install-kubernetes-controlnode.sh 2>&1 | tee /var/log/02-install-kubernetes-controlnode.out
              ignoreErrors: false
    CreationPolicy:
      ResourceSignal:
        Timeout: PT30M
    Properties:
      ImageId: !Ref Ubuntu2404AMI
      InstanceType: !Ref EC2InstanceType
      IamInstanceProfile: !Ref KubernetesIAMInstanceProfile
      BlockDeviceMappings:
        - DeviceName: /dev/sda1 # Or /dev/sda1 depending on AMI
          Ebs:
            VolumeSize: '50' # Size in GB
            VolumeType: gp3
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: KubernetesControlNode
      SecurityGroupIds:
        - !Ref KubernetesSecurityGroup
      SubnetId: !Ref PublicSubnetAZa
      PrivateIpAddress: !Ref PrivateIpControl
      UserData: 
        "Fn::Base64": 
          !Sub |
            #!/bin/bash
            # ===
            # Source: https://gist.github.com/b0tting/f1a83a8ecca42ae37cc2c40d6174cead - used to install cfn-init and cfn-signal
            export DEBIAN_FRONTEND=noninteractive
            export VENV_DIR=/opt/aws/cfn-bootstrap-venv
            export HELPER_SCRIPTS_BIN_DIR=/opt/aws/bin

            # Install python 3.11 from deadsnakes, this will not be the default python, that will stay on 3.12
            apt update	
            apt-get install -y tzdata software-properties-common
            add-apt-repository -y ppa:deadsnakes/ppa 
            apt update
            apt install -y python3.11 python3.11-venv 

            # Set up a virtual env
            mkdir -p $VENV_DIR	
            python3.11 -m venv $VENV_DIR	
            source $VENV_DIR/bin/activate

            # Install the CFN helper scripts. These will link to the virtual environment & 3.11, not touching the 
            # system standard python 3.12
            pip3 install https://s3.amazonaws.com/cloudformation-examples/aws-cfn-bootstrap-py3-latest.tar.gz
            mkdir -p $HELPER_SCRIPTS_BIN_DIR	
            ln -s $VENV_DIR/bin/cfn-* $HELPER_SCRIPTS_BIN_DIR
            deactivate
            #===

            /opt/aws/bin/cfn-init -v --stack ${AWS::StackName} --resource KubernetesControlNode --region ${AWS::Region}
            /opt/aws/bin/cfn-signal -e 0 --stack ${AWS::StackName} --resource KubernetesControlNode --region ${AWS::Region}

