AWSTemplateFormatVersion: "2010-09-09"
Description: Create virtual machines for Docker and Kubernetes workshop

Parameters:

  Ubuntu2404AMI: 
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/canonical/ubuntu/server/noble/stable/current/amd64/hvm/ebs-gp3/ami-id
  EC2InstanceType:
    Type: String
    Default: t2.large  # t2.large is 8 GiB ram, 2 vCPUs - this should be enough for a test environment

  PrivateIpControl:
    Type: String
    Default: 172.31.0.10
  PrivateIpWorker:
    Type: String
    Default: 172.31.0.11
  PrivateIpWorker2:
    Type: String
    Default: 172.31.0.12

  DefaultPassword:
    Type: String
    Default: DemoPassword
  ConsultantName:
    Type: String
    Default: Frederique
  BranchName:
    Type: String
    Default: main

Mappings:
  AWSManagedRoles:
    SSM:
      AmazonSSMManagedInstanceCore: "arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore"
    ECR:
      EC2InstanceProfileForImageBuilderECRContainerBuilds: "arn:aws:iam::aws:policy/EC2InstanceProfileForImageBuilderECRContainerBuilds"

Resources:

  KubernetesVPC:
    Type: AWS::EC2::VPC
    Properties: 
      CidrBlock: 172.31.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      InstanceTenancy: default
      Tags:
        - Key: Name
          Value: !Sub "Kubernetes-workshop-${ConsultantName}"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref KubernetesVPC

  ExecuteDeleteVpcFunction:
    Type: Custom::ExecuteDeleteVpcFunction
    Properties:
      Vpc           : !Ref KubernetesVPC
      ServiceToken  : !GetAtt DeleteVpcFunction.Arn

  PublicSubnetAZa:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Join ["", [!Ref "AWS::Region", "a"]]
      CidrBlock: 172.31.0.0/16
      MapPublicIpOnLaunch: true
      VpcId: !Ref KubernetesVPC
      Tags:
        - Key: Name
          Value: PublicSubnetAZa
  PublicSubnetAZaRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetAZa

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      Tags:
        - Key: Name
          Value: PublicRouteTable
      VpcId: !Ref KubernetesVPC
  PublicRoutePublicInternet:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  KubernetesIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
              - ec2.amazonaws.com
            Action:
              - 'sts:AssumeRole'
      Path: /
      ManagedPolicyArns:
        - !FindInMap [ "AWSManagedRoles", "SSM", "AmazonSSMManagedInstanceCore"]
        - !FindInMap [ "AWSManagedRoles", "ECR", "EC2InstanceProfileForImageBuilderECRContainerBuilds"]
      Policies:
        - PolicyName: "ReadExternalSecretsOperatorCredentials"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: "Allow"
                Action:
                  - "secretsmanager:GetSecretValue"
                  - "secretsmanager:DescribeSecret"
                Resource:
                  - !Ref ExternalSecretsOperatorSSMCredentials
                  - !Ref ExternalSecretsOperatorSecretsCredentials
                  - !Ref CrossplaneCredentials

  KubernetesIAMInstanceProfile:
    Type: "AWS::IAM::InstanceProfile"
    Properties:
      Path: "/"
      Roles:
        - !Ref KubernetesIAMRole

  KubernetesSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Securitygroup for K8S
      VpcId: !Ref KubernetesVPC
      SecurityGroupIngress:
        - CidrIp: 0.0.0.0/0
          FromPort: 30001
          ToPort: 30030
          IpProtocol: TCP
        - CidrIp: 172.31.0.0/16
          FromPort: 0
          ToPort: 65535
          IpProtocol: TCP
        - CidrIp: 172.31.0.0/16
          FromPort: 0
          ToPort: 65535
          IpProtocol: UDP

  KubernetesControlNode:
    Type: AWS::EC2::Instance
    Metadata:
      'AWS::CloudFormation::Init':
        config:
          packages:
            apt:
              git: []
              golang-go: []
              net-tools: []
              unzip: []
          files:
            '/opt/xforce/01-initialize-files.sh':
              content: !Sub |
                #!/bin/bash
                mkdir -p /clone
                cd /clone

                git clone -b ${BranchName} https://github.com/FrederiqueRetsema/Kubecon26-example-repo.git

                # Change variables in the scripts by values in the CloudFormation template
                find . -type f -exec sed -i 's/##DefaultPassword##/'${DefaultPassword}'/g' {} \;
                find . -type f -exec sed -i 's/##AWS-Region##/'${AWS::Region}'/g' {} \;

          commands:
            01-initialize-files:
              command: bash /opt/xforce/01-initialize-files.sh 2>&1 | tee /var/log/01-initialize-files.out
              ignoreErrors: false
            02-install-kubernetes-controlnode:
              command: bash /clone/Kubecon26-example-repo/aws-deployment/install/02-install-kubernetes-controlnode.sh control 2>&1 | tee /var/log/02-install-kubernetes-controlnode.out
              ignoreErrors: false
    CreationPolicy:
      ResourceSignal:
        Timeout: PT30M
    Properties:
      ImageId: !Ref Ubuntu2404AMI
      InstanceType: !Ref EC2InstanceType
      IamInstanceProfile: !Ref KubernetesIAMInstanceProfile
      BlockDeviceMappings:
        - DeviceName: /dev/sda1 # Or /dev/sda1 depending on AMI
          Ebs:
            VolumeSize: '50' # Size in GB
            VolumeType: gp3
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: KubernetesControlNode
      SecurityGroupIds:
        - !Ref KubernetesSecurityGroup
      SubnetId: !Ref PublicSubnetAZa
      PrivateIpAddress: !Ref PrivateIpControl
      UserData: 
        "Fn::Base64": 
          !Sub |
            #!/bin/bash
            # ===
            # Source: https://gist.github.com/b0tting/f1a83a8ecca42ae37cc2c40d6174cead - used to install cfn-init and cfn-signal
            export DEBIAN_FRONTEND=noninteractive
            export VENV_DIR=/opt/aws/cfn-bootstrap-venv
            export HELPER_SCRIPTS_BIN_DIR=/opt/aws/bin

            # Install python 3.11 from deadsnakes, this will not be the default python, that will stay on 3.12
            apt update	
            apt-get install -y tzdata software-properties-common
            add-apt-repository -y ppa:deadsnakes/ppa 
            apt update
            apt install -y python3.11 python3.11-venv 

            # Set up a virtual env
            mkdir -p $VENV_DIR	
            python3.11 -m venv $VENV_DIR	
            source $VENV_DIR/bin/activate

            # Install the CFN helper scripts. These will link to the virtual environment & 3.11, not touching the 
            # system standard python 3.12
            pip3 install https://s3.amazonaws.com/cloudformation-examples/aws-cfn-bootstrap-py3-latest.tar.gz
            mkdir -p $HELPER_SCRIPTS_BIN_DIR	
            ln -s $VENV_DIR/bin/cfn-* $HELPER_SCRIPTS_BIN_DIR
            deactivate
            #===

            /opt/aws/bin/cfn-init -v --stack ${AWS::StackName} --resource KubernetesControlNode --region ${AWS::Region}
            /opt/aws/bin/cfn-signal -e 0 --stack ${AWS::StackName} --resource KubernetesControlNode --region ${AWS::Region}

  KubernetesWorkerNode:
    Type: AWS::EC2::Instance
    Metadata:
      'AWS::CloudFormation::Init':
        config:
          packages:
            apt:
              git: []
          files:
            '/opt/xforce/01-initialize-files.sh':
              content: !Sub |
                #!/bin/bash
                mkdir -p /clone
                cd /clone

                git clone -b ${BranchName} https://github.com/FrederiqueRetsema/Kubecon26-example-repo.git

                # Change variables in the scripts by values in the CloudFormation template
                find . -type f -exec sed -i 's/##DefaultPassword##/'${DefaultPassword}'/g' {} \;
          commands:
            01-initialize-files:
              command: bash /opt/xforce/01-initialize-files.sh 2>&1 | tee /var/log/01-initialize-files.out
              ignoreErrors: false
            02-install-kubernetes-workernode:
              command: bash /clone/Kubecon26-example-repo/aws-deployment/install/02-install-kubernetes-workernode.sh worker 2>&1 | tee /var/log/02-install-kubernetes-workernode.out
              ignoreErrors: false
    CreationPolicy:
      ResourceSignal:
        Timeout: PT30M
    Properties:
      ImageId: !Ref Ubuntu2404AMI
      InstanceType: !Ref EC2InstanceType
      BlockDeviceMappings:
        - DeviceName: /dev/sda1 # Or /dev/sda1 depending on AMI
          Ebs:
            VolumeSize: '50' # Size in GB
            VolumeType: gp3
            DeleteOnTermination: true
      IamInstanceProfile: !Ref KubernetesIAMInstanceProfile
      Tags:
        - Key: Name
          Value: KubernetesWorkerNode
      SecurityGroupIds:
        - !Ref KubernetesSecurityGroup
      SubnetId: !Ref PublicSubnetAZa
      PrivateIpAddress: !Ref PrivateIpWorker
      UserData: 
        "Fn::Base64": 
          !Sub |
            #!/bin/bash
            # ===
            # Source: https://gist.github.com/b0tting/f1a83a8ecca42ae37cc2c40d6174cead - used to install cfn-init and cfn-signal
            export DEBIAN_FRONTEND=noninteractive
            export VENV_DIR=/opt/aws/cfn-bootstrap-venv
            export HELPER_SCRIPTS_BIN_DIR=/opt/aws/bin

            # Install python 3.11 from deadsnakes, this will not be the default python, that will stay on 3.12
            apt update	
            apt-get install -y tzdata software-properties-common
            add-apt-repository -y ppa:deadsnakes/ppa 
            apt update
            apt install -y python3.11 python3.11-venv 

            # Set up a virtual env
            mkdir -p $VENV_DIR	
            python3.11 -m venv $VENV_DIR	
            source $VENV_DIR/bin/activate

            # Install the CFN helper scripts. These will link to the virtual environment & 3.11, not touching the 
            # system standard python 3.12
            pip3 install https://s3.amazonaws.com/cloudformation-examples/aws-cfn-bootstrap-py3-latest.tar.gz
            mkdir -p $HELPER_SCRIPTS_BIN_DIR	
            ln -s $VENV_DIR/bin/cfn-* $HELPER_SCRIPTS_BIN_DIR
            deactivate
            #===

            /opt/aws/bin/cfn-init -v --stack ${AWS::StackName} --resource KubernetesWorkerNode --region ${AWS::Region}
            /opt/aws/bin/cfn-signal -e 0 --stack ${AWS::StackName} --resource KubernetesWorkerNode --region ${AWS::Region}

  KubernetesWorkerNode2:
    Type: AWS::EC2::Instance
    Metadata:
      'AWS::CloudFormation::Init':
        config:
          packages:
            apt:
              git: []
          files:
            '/opt/xforce/01-initialize-files.sh':
              content: !Sub |
                #!/bin/bash
                mkdir -p /clone
                cd /clone

                git clone -b ${BranchName} https://github.com/FrederiqueRetsema/Kubecon26-example-repo.git

                # Change variables in the scripts by values in the CloudFormation template
                find . -type f -exec sed -i 's/##DefaultPassword##/'${DefaultPassword}'/g' {} \;
          commands:
            01-initialize-files:
              command: bash /opt/xforce/01-initialize-files.sh 2>&1 | tee /var/log/01-initialize-files.out
              ignoreErrors: false
            02-install-kubernetes-workernode2:
              command: bash /clone/Kubecon26-example-repo/aws-deployment/install/02-install-kubernetes-workernode2.sh worker2 2>&1 | tee /var/log/02-install-kubernetes-workernode2.out
              ignoreErrors: false
    CreationPolicy:
      ResourceSignal:
        Timeout: PT30M
    Properties:
      ImageId: !Ref Ubuntu2404AMI
      InstanceType: !Ref EC2InstanceType
      BlockDeviceMappings:
        - DeviceName: /dev/sda1 # Or /dev/sda1 depending on AMI
          Ebs:
            VolumeSize: '50' # Size in GB
            VolumeType: gp3
            DeleteOnTermination: true
      IamInstanceProfile: !Ref KubernetesIAMInstanceProfile
      Tags:
        - Key: Name
          Value: KubernetesWorkerNode2
      SecurityGroupIds:
        - !Ref KubernetesSecurityGroup
      SubnetId: !Ref PublicSubnetAZa
      PrivateIpAddress: !Ref PrivateIpWorker2
      UserData: 
        "Fn::Base64": 
          !Sub |
            #!/bin/bash
            # ===
            # Source: https://gist.github.com/b0tting/f1a83a8ecca42ae37cc2c40d6174cead - used to install cfn-init and cfn-signal
            export DEBIAN_FRONTEND=noninteractive
            export VENV_DIR=/opt/aws/cfn-bootstrap-venv
            export HELPER_SCRIPTS_BIN_DIR=/opt/aws/bin

            # Install python 3.11 from deadsnakes, this will not be the default python, that will stay on 3.12
            apt update	
            apt-get install -y tzdata software-properties-common
            add-apt-repository -y ppa:deadsnakes/ppa 
            apt update
            apt install -y python3.11 python3.11-venv 

            # Set up a virtual env
            mkdir -p $VENV_DIR	
            python3.11 -m venv $VENV_DIR	
            source $VENV_DIR/bin/activate

            # Install the CFN helper scripts. These will link to the virtual environment & 3.11, not touching the 
            # system standard python 3.12
            pip3 install https://s3.amazonaws.com/cloudformation-examples/aws-cfn-bootstrap-py3-latest.tar.gz
            mkdir -p $HELPER_SCRIPTS_BIN_DIR	
            ln -s $VENV_DIR/bin/cfn-* $HELPER_SCRIPTS_BIN_DIR
            deactivate
            #===

            /opt/aws/bin/cfn-init -v --stack ${AWS::StackName} --resource KubernetesWorkerNode2 --region ${AWS::Region}
            /opt/aws/bin/cfn-signal -e 0 --stack ${AWS::StackName} --resource KubernetesWorkerNode2 --region ${AWS::Region}

  # DeleteVpc
  # =========
  # When the VPC is deleted, there might be extra security groups that have been added because someone tried f.e. to start a VM in that VPC. The deletion of the VPC
  # will wait until these SGs have been removed. This is not friendly for the users of the templates, so delete the SGs by this custom resource.  

  DeleteVpcExecutionRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal:
              Service:
              - "lambda.amazonaws.com"
            Action:
              - "sts:AssumeRole"
      Policies:
        - PolicyName: "DeleteVpcExecutionRolePolicies"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: CloudWatch
                Effect: "Allow"
                Action: 
                  - "logs:PutLogEvents"
                  - "logs:CreateLogStream"
                  - "logs:CreateLogGroup"
                Resource: "*"
              - Sid: EC2
                Effect: "Allow"
                Action: 
                  - "ec2:DescribeSecurityGroups"  
                  - "ec2:DeleteSecurityGroup"
                Resource: "*"
      Path: /
  DeleteVpcFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Role: !GetAtt DeleteVpcExecutionRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          #!/usr/bin/env python
          # -*- coding: utf-8 -*-
          # https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/cfn-lambda-function-code-cfnresponsemodule.html

          import json
          import cfnresponse
          import boto3

          # get_security_groups
          # ===================
          def get_security_groups(vpc):
            ec2 = boto3.client('ec2')
            response = ec2.describe_security_groups(
                Filters=[
                    {
                        'Name': 'vpc-id',
                        'Values': [vpc]
                    },
                ]
            )
            return response["SecurityGroups"]

          # delete_security_group
          # =====================
          def delete_security_group(security_group_name, security_group_id):
            print("TRACE Delete security group " + security_group_name)

            ec2 = boto3.client('ec2')
            response = ec2.delete_security_group(
              GroupId=security_group_id
            )
            print(response)

          # Main
          # ====

          def lambda_handler(event, context):
            try:
                vpc = event['ResourceProperties']['Vpc']
                print(event)

                if event['RequestType'] == 'Delete':
                    print ("TRACE Get security groups")
                    security_groups = get_security_groups(vpc)
                    print(security_groups)

                    for security_group in security_groups:

                      security_group_is_part_of_stack = False
                      if ("Tags" in security_group):
                        for tag in security_group["Tags"]:

                          if (tag["Key"] == "aws:cloudformation:stack-name"):
                            security_group_is_part_of_stack = True

                      security_group_name = security_group["GroupName"]
                      security_group_id   = security_group["GroupId"]

                      if ((not security_group_is_part_of_stack) and 
                          (security_group_name != "default")):

                        delete_security_group(security_group_name, security_group_id)

                print("TRACE Before SUCCESS")
                responseData = {}
                cfnresponse.send(event, context, cfnresponse.SUCCESS, responseData, "n/a")
            except Exception as e:
                print(e)
                print("TRACE Before FAILED")
                responseData = {}
                cfnresponse.send(event, context, cfnresponse.FAILED, responseData, "n/a")

            return
      Runtime: python3.13

  SSMParameterUrl:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /kubecon26/examples/03-refresh-secrets-aws/url
      Type: String
      Value: "mysql3.example.com:3306"

  SSMParameterUserid:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /kubecon26/examples/03-refresh-secrets-aws/userid
      Type: String
      Value: my_third_user

  SSMSecureStringExecutionRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal:
              Service:
              - "lambda.amazonaws.com"
            Action:
              - "sts:AssumeRole"
      Policies:
        - PolicyName: "SSMSecureStringPolicies"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: CloudWatch
                Effect: "Allow"
                Action:
                  - "logs:PutLogEvents"
                  - "logs:CreateLogStream"
                  - "logs:CreateLogGroup"
                Resource: "*"
              - Sid: SSM
                Effect: "Allow"
                Action:
                  - "ssm:PutParameter"
                  - "ssm:DeleteParameter"
                Resource: "*"
      Path: /

  SSMSecureStringFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Role: !GetAtt SSMSecureStringExecutionRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          #!/usr/bin/env python
          # -*- coding: utf-8 -*-

          import cfnresponse
          import boto3

          def lambda_handler(event, context):
            try:
                ssm = boto3.client('ssm')
                name  = event['ResourceProperties']['Name']
                value = event['ResourceProperties']['Value']

                if event['RequestType'] in ['Create', 'Update']:
                    ssm.put_parameter(
                        Name=name,
                        Value=value,
                        Type='SecureString',
                        Overwrite=True
                    )

                if event['RequestType'] == 'Delete':
                    try:
                        ssm.delete_parameter(Name=name)
                    except ssm.exceptions.ParameterNotFound:
                        pass

                cfnresponse.send(event, context, cfnresponse.SUCCESS, {}, name)
            except Exception as e:
                print(e)
                cfnresponse.send(event, context, cfnresponse.FAILED, {}, "n/a")
      Runtime: python3.13

  SSMParameterPassword:
    Type: Custom::SSMSecureString
    Properties:
      ServiceToken: !GetAtt SSMSecureStringFunction.Arn
      Name: /kubecon26/examples/03-refresh-secrets-aws/password
      Value: my_third_demo_password

  SSMParameterReadWritePolicy:
    Type: "AWS::IAM::ManagedPolicy"
    Properties:
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowReadAndWriteOnSSMParametersInKubecon26Parameters
            Effect: "Allow"
            Action:
              - "ssm:DeleteParameter"
              - "ssm:DeleteParameters"
              - "ssm:DescribeParameters"
              - "ssm:GetParameter"
              - "ssm:GetParameters"
              - "ssm:GetParametersByPath"
              - "ssm:PutParameter"
            Resource:
              - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/kubecon26/examples/03-refresh-secrets-aws/*"

  ExternalSecretsOperatorSSMUser:
    Type: "AWS::IAM::User"
    Properties:
      UserName: kubecon26-external-secrets-operator-ssm-parameters
      ManagedPolicyArns:
        - !Ref SSMParameterReadWritePolicy

  ExternalSecretsOperatorSSMAccessKey:
    Type: "AWS::IAM::AccessKey"
    Properties:
      UserName: !Ref ExternalSecretsOperatorSSMUser

  ExternalSecretsOperatorSSMCredentials:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: kubecon26-external-secrets-operator-ssm-credentials
      SecretString: !Sub
        - '{"access_key":"${AccessKey}","secret_access_key":"${SecretKey}"}'
        - AccessKey: !Ref ExternalSecretsOperatorSSMAccessKey
          SecretKey: !GetAtt ExternalSecretsOperatorSSMAccessKey.SecretAccessKey

  SecretsManagerReadWritePolicy:
    Type: "AWS::IAM::ManagedPolicy"
    Properties:
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowReadAndWriteOnMysqlCredentialsSecret
            Effect: "Allow"
            Action:
              - "secretsmanager:GetSecretValue"
              - "secretsmanager:DescribeSecret"
              - "secretsmanager:PutSecretValue"
              - "secretsmanager:UpdateSecret"
            Resource: !Ref MysqlCredentials

  ExternalSecretsOperatorSecretsUser:
    Type: "AWS::IAM::User"
    Properties:
      UserName: kubecon26-external-secrets-operator-secrets-manager
      ManagedPolicyArns:
        - !Ref SecretsManagerReadWritePolicy

  ExternalSecretsOperatorSecretsAccessKey:
    Type: "AWS::IAM::AccessKey"
    Properties:
      UserName: !Ref ExternalSecretsOperatorSecretsUser

  ExternalSecretsOperatorSecretsCredentials:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: kubecon26-external-secrets-operator-secrets-credentials
      SecretString: !Sub
        - '{"access_key":"${AccessKey}","secret_access_key":"${SecretKey}"}'
        - AccessKey: !Ref ExternalSecretsOperatorSecretsAccessKey
          SecretKey: !GetAtt ExternalSecretsOperatorSecretsAccessKey.SecretAccessKey

  MysqlCredentials:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: mysql_credentials
      SecretString: |
        {"url"     : "mysql2.example.com:3306",
         "userid"  : "my_second_user",
         "password": "my_second_demo_password"}

  CrossplanePolicy:
    Type: "AWS::IAM::ManagedPolicy"
    Properties:
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowS3BucketManagement
            Effect: "Allow"
            Action:
              - "s3:CreateBucket"
              - "s3:DeleteBucket"
              - "s3:GetAccelerateConfiguration"
              - "s3:GetBucketAcl"
              - "s3:GetBucketCORS"
              - "s3:GetBucketLocation"
              - "s3:GetBucketLogging"
              - "s3:GetBucketObjectLockConfiguration"
              - "s3:GetBucketPolicy"
              - "s3:GetBucketRequestPayment"
              - "s3:GetBucketTagging"
              - "s3:GetBucketVersioning"
              - "s3:GetBucketWebsite"
              - "s3:GetEncryptionConfiguration"
              - "s3:GetLifecycleConfiguration"
              - "s3:GetReplicationConfiguration"
              - "s3:ListBucket"
              - "s3:PutBucketTagging"
            Resource: "*"
          - Sid: AllowSSMParameterManagement
            Effect: "Allow"
            Action:
              - "ssm:PutParameter"
              - "ssm:GetParameter"
              - "ssm:GetParameters"
              - "ssm:DeleteParameter"
              - "ssm:ListTagsForResource"
              - "ssm:AddTagsToResource"
              - "ssm:RemoveTagsFromResource"
            Resource:
              - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/kubecon26/examples/04-crossplane/*"
          - Sid: AllowSSMDescribeParameters
            Effect: "Allow"
            Action:
              - "ssm:DescribeParameters"
            Resource: "*"
          - Sid: AllowSecretsManagerManagement
            Effect: "Allow"
            Action:
              - "secretsmanager:CreateSecret"
              - "secretsmanager:DeleteSecret"
              - "secretsmanager:DescribeSecret"
              - "secretsmanager:GetSecretValue"
              - "secretsmanager:PutSecretValue"
              - "secretsmanager:UpdateSecret"
              - "secretsmanager:TagResource"
              - "secretsmanager:UntagResource"
              - "secretsmanager:GetResourcePolicy"
            Resource:
              - !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:kubecon26/examples/04-crossplane/*"

  CrossplaneUser:
    Type: "AWS::IAM::User"
    Properties:
      UserName: kubecon26-crossplane
      ManagedPolicyArns:
        - !Ref CrossplanePolicy

  CrossplaneAccessKey:
    Type: "AWS::IAM::AccessKey"
    Properties:
      UserName: !Ref CrossplaneUser

  CrossplaneCredentials:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: kubecon26-crossplane-credentials
      SecretString: !Sub
        - '{"access_key":"${AccessKey}","secret_access_key":"${SecretKey}"}'
        - AccessKey: !Ref CrossplaneAccessKey
          SecretKey: !GetAtt CrossplaneAccessKey.SecretAccessKey

Outputs:
  ControlNodeId:
    Value: !Ref KubernetesControlNode
  WorkerNodeId:
    Value: !Ref KubernetesWorkerNode

