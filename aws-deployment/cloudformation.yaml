            '/opt/xforce/id_rsa.pub': 
              content: !Sub |
                ssh-rsa  kubernetes@worker
              mode: 000400
            '/opt/xforce/authorized_keys': 
              content: !Sub |
                ssh-rsa  kubernetes@control
              mode: 000400
            '/opt/xforce/01-install-kubernetes-workernode.sh':
              content: !Sub |
                #!/bin/bash
                function os_update() {
                  apt update 
                  apt upgrade -y
                }

                function change_hostname() {
                  hostname=$1
                  echo $hostname > /etc/hostname
                  hostname $hostname
                }

                function add_hostnames_to_hosts_file() {
                  echo "172.31.0.10 control" >> /etc/hosts
                  echo "172.31.0.11 worker" >> /etc/hosts
                  echo "172.31.0.12 worker2" >> /etc/hosts
                }

                function sudu_no_passwd() {
                  groupadd admin
                  sed -i "s/%admin ALL=(ALL) ALL/%admin ALL=(ALL) NOPASSWD: ALL/" /etc/sudoers 
                }

                function add_user() {
                  USERNAME=$1

                  echo /usr/sbin/useradd -d /home/$USERNAME -G admin -m -s /bin/bash $USERNAME > /var/log/useradd.txt
                  /usr/sbin/useradd -d /home/$USERNAME -G admin -m -s /bin/bash $USERNAME 
                  echo -e "${DefaultPassword}\n${DefaultPassword}" | passwd $USERNAME
                }

                function use_vim() {
                  USERNAME=$1

                  echo "export VISUAL=vim" >> /home/$USERNAME/.bashrc
                }

                function create_ssh_keyfiles() {
                  mkdir -p /home/kubernetes/.ssh
                  mv /opt/xforce/id_rsa /home/kubernetes/.ssh/id_rsa
                  chmod 400 /home/kubernetes/.ssh/id_rsa
                  mv /opt/xforce/id_rsa.pub /home/kubernetes/.ssh/id_rsa.pub
                  chmod 400 /home/kubernetes/.ssh/id_rsa.pub
                  mv /opt/xforce/authorized_keys /home/kubernetes/.ssh/authorized_keys
                  chmod 400 /home/kubernetes/.ssh/authorized_keys

                  systemctl daemon-reload
                  systemctl restart ssh
                }

                function install_kubernetes_worker() {
                  mkdir -p /opt/kubernetes
                  cd /opt/kubernetes

                  apt update && apt upgrade -y
                  apt install openssh-server -y
                  systemctl enable --now ssh
                  ufw allow ssh
                  ufw reload
                  sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config

                  LINE_NO=$(grep -n swap /etc/fstab | awk -F':' '{print $1}')
                  sed -i "$LINE_NO""d" /etc/fstab 
                  swapoff -a

                  echo "overlay" > /etc/modules-load.d/k8s.conf
                  echo "br_netfilter" >> /etc/modules-load.d/k8s.conf
                  modprobe overlay
                  modprobe br_netfilter

                  echo "net.bridge.bridge-nf-call-iptables  = 1" > /etc/sysctl.d/k8s.conf
                  echo "net.bridge.bridge-nf-call-ip6tables = 1" >> /etc/sysctl.d/k8s.conf
                  echo "net.ipv4.ip_forward                 = 1" >> /etc/sysctl.d/k8s.conf

                  sysctl --system

                  mkdir -p /usr/local/lib/systemd/system
                  cd /tmp
                  curl -OL https://github.com/containerd/containerd/releases/download/v2.2.2/containerd-2.2.2-linux-amd64.tar.gz
                  tar Cxzvf /usr/local containerd-2.2.2-linux-amd64.tar.gz

                  curl -OL https://raw.githubusercontent.com/containerd/containerd/main/containerd.service
                  cp containerd.service /usr/local/lib/systemd/system/containerd.service

                  curl -OL https://github.com/opencontainers/runc/releases/download/v1.3.5/runc.amd64
                  install -m 755 runc.amd64 /usr/local/sbin/runc

                  curl -OL https://github.com/containernetworking/plugins/releases/download/v1.9.1/cni-plugins-linux-amd64-v1.9.1.tgz
                  mkdir -p /opt/cni/bin
                  tar Cxzvf /opt/cni/bin cni-plugins-linux-amd64-v1.9.1.tgz

                  systemctl daemon-reload
                  systemctl enable --now containerd

                  mkdir -p /etc/containerd
                  containerd config default | tee /etc/containerd/config.toml

                  apt-get install -y apt-transport-https ca-certificates curl gpg
                  curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
                  curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl.sha256"

                  # Link: https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/install-kubeadm/
                  mkdir -p -m 755 /etc/apt/keyrings
                  curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.35/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg

                  echo 'deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.35/deb/ /' | tee /etc/apt/sources.list.d/kubernetes.list
                  apt update
                  apt-get install -y kubelet kubeadm kubectl
                  apt-mark hold kubelet kubeadm kubectl

                  systemctl enable --now kubelet
                }

                function join_cluster() {
                  su - kubernetes
                  cd ~kubernetes

                  while true
                  do
                    sudo -u kubernetes scp -o StrictHostKeyChecking=no kubernetes@control:/home/kubernetes/join-cmd.sh .

                    if test -f ./join-cmd.sh
                    then
                      sudo bash ./join-cmd.sh
                      break
                    else
                      echo wait for join command...
                      sleep 10
                    fi
                  done
                }

                function change_permissions() {
                  chown kubernetes:kubernetes -R /home/kubernetes
                  chown kubernetes:kubernetes -R /opt
                }

                function force_password_change() {
                  passwd -e kubernetes
                }

                os_update
                change_hostname worker2
                add_hostnames_to_hosts_file
                sudu_no_passwd

                for USER in $(echo ${Usernames} | tr "," "\n")
                do
                        add_user $USER
                        use_vim $USER
                done
                add_user kubernetes
                use_vim kubernetes
                use_vim root

                create_ssh_keyfiles
                change_permissions

                install_kubernetes_worker
                change_permissions

                join_cluster

                sleep 300
                force_password_change
              mode: 000500
          commands:
            01-install-kubernetes-workernode:
              command: /opt/xforce/01-install-kubernetes-workernode.sh 2>&1 | tee /var/log/01-install-kubernetes-workernode.out
              ignoreErrors: false
    CreationPolicy:
      ResourceSignal:
        Timeout: PT30M
    Properties:
      ImageId: !Ref Ubuntu2404AMI
      InstanceType: !Ref EC2InstanceType
      BlockDeviceMappings:
        - DeviceName: /dev/sda1 # Or /dev/sda1 depending on AMI
          Ebs:
            VolumeSize: '50' # Size in GB
            VolumeType: gp3
            DeleteOnTermination: true
      IamInstanceProfile: !Ref KubernetesIAMInstanceProfile
      Tags:
        - Key: Name
          Value: KubernetesWorkerNode2
      SecurityGroupIds:
        - !Ref KubernetesSecurityGroup
      SubnetId: !Ref PublicSubnetAZa
      PrivateIpAddress: !Ref PrivateIpWorker2
      UserData: 
        "Fn::Base64": 
          !Sub |
            #!/bin/bash
            # ===
            # Source: https://gist.github.com/b0tting/f1a83a8ecca42ae37cc2c40d6174cead - used to install cfn-init and cfn-signal
            export DEBIAN_FRONTEND=noninteractive
            export VENV_DIR=/opt/aws/cfn-bootstrap-venv
            export HELPER_SCRIPTS_BIN_DIR=/opt/aws/bin

            # Install python 3.11 from deadsnakes, this will not be the default python, that will stay on 3.12
            apt update	
            apt-get install -y tzdata software-properties-common
            add-apt-repository -y ppa:deadsnakes/ppa 
            apt update
            apt install -y python3.11 python3.11-venv 

            # Set up a virtual env
            mkdir -p $VENV_DIR	
            python3.11 -m venv $VENV_DIR	
            source $VENV_DIR/bin/activate

            # Install the CFN helper scripts. These will link to the virtual environment & 3.11, not touching the 
            # system standard python 3.12
            pip3 install https://s3.amazonaws.com/cloudformation-examples/aws-cfn-bootstrap-py3-latest.tar.gz
            mkdir -p $HELPER_SCRIPTS_BIN_DIR	
            ln -s $VENV_DIR/bin/cfn-* $HELPER_SCRIPTS_BIN_DIR
            deactivate
            #===

            /opt/aws/bin/cfn-init -v --stack ${AWS::StackName} --resource KubernetesWorkerNode2 --region ${AWS::Region}
            /opt/aws/bin/cfn-signal -e 0 --stack ${AWS::StackName} --resource KubernetesWorkerNode2 --region ${AWS::Region}

  # DeleteVpc
  # =========
  # When the VPC is deleted, there might be extra security groups that have been added because someone tried f.e. to start a VM in that VPC. The deletion of the VPC
  # will wait until these SGs have been removed. This is not friendly for the users of the templates, so delete the SGs by this custom resource.  

  DeleteVpcExecutionRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal:
              Service:
              - "lambda.amazonaws.com"
            Action:
              - "sts:AssumeRole"
      Policies:
        - PolicyName: "DeleteVpcExecutionRolePolicies"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: CloudWatch
                Effect: "Allow"
                Action: 
                  - "logs:PutLogEvents"
                  - "logs:CreateLogStream"
                  - "logs:CreateLogGroup"
                Resource: "*"
              - Sid: EC2
                Effect: "Allow"
                Action: 
                  - "ec2:DescribeSecurityGroups"  
                  - "ec2:DeleteSecurityGroup"
                Resource: "*"
      Path: /
  DeleteVpcFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Role: !GetAtt DeleteVpcExecutionRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          #!/usr/bin/env python
          # -*- coding: utf-8 -*-
          # https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/cfn-lambda-function-code-cfnresponsemodule.html

          import json
          import cfnresponse
          import boto3

          # get_security_groups
          # ===================
          def get_security_groups(vpc):
            ec2 = boto3.client('ec2')
            response = ec2.describe_security_groups(
                Filters=[
                    {
                        'Name': 'vpc-id',
                        'Values': [vpc]
                    },
                ]
            )
            return response["SecurityGroups"]

          # delete_security_group
          # =====================
          def delete_security_group(security_group_name, security_group_id):
            print("TRACE Delete security group " + security_group_name)

            ec2 = boto3.client('ec2')
            response = ec2.delete_security_group(
              GroupId=security_group_id
            )
            print(response)

          # Main
          # ====

          def lambda_handler(event, context):
            try:
                vpc = event['ResourceProperties']['Vpc']
                print(event)

                if event['RequestType'] == 'Delete':
                    print ("TRACE Get security groups")
                    security_groups = get_security_groups(vpc)
                    print(security_groups)

                    for security_group in security_groups:

                      security_group_is_part_of_stack = False
                      if ("Tags" in security_group):
                        for tag in security_group["Tags"]:

                          if (tag["Key"] == "aws:cloudformation:stack-name"):
                            security_group_is_part_of_stack = True

                      security_group_name = security_group["GroupName"]
                      security_group_id   = security_group["GroupId"]

                      if ((not security_group_is_part_of_stack) and 
                          (security_group_name != "default")):

                        delete_security_group(security_group_name, security_group_id)

                print("TRACE Before SUCCESS")
                responseData = {}
                cfnresponse.send(event, context, cfnresponse.SUCCESS, responseData, "n/a")
            except Exception as e:
                print(e)
                print("TRACE Before FAILED")
                responseData = {}
                cfnresponse.send(event, context, cfnresponse.FAILED, responseData, "n/a")

            return
      Runtime: python3.13

  NginxRepository:
    Type: AWS::ECR::Repository
    Properties:
      EmptyOnDelete: True
      RepositoryName: nginx

